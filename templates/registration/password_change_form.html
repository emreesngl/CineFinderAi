{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Şifre Değiştir{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="panel p-4 rounded">
            <h2 class="mb-4 text-center text-white">Şifre Değiştir</h2>
            <form method="post">
                {% csrf_token %}
                {{ form|crispy }}
                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-primary">Şifreyi Değiştir</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
