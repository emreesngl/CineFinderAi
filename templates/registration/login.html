{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Giriş Yap{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card bg-dark text-light panel border-secondary">
            <div class="card-body p-4 p-md-5">
                <h2 class="card-title text-center mb-4 text-primary">Giriş Yap</h2>
                
                <!-- Google ile Giriş Butonu -->
                <div class="d-grid mb-3">
                    <button onclick="submitGoogleForm()" class="btn btn-outline-light btn-lg d-flex align-items-center justify-content-center">
                        <svg class="me-2" width="20" height="20" viewBox="0 0 24 24">
                            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        </svg>
                        Google ile Giriş Yap
                    </button>
                </div>

                <!-- Gizli Google Form -->
                <form id="googleForm" method="post" action="/accounts/google/login/" style="display: none;">
                    {% csrf_token %}
                </form>
                
                <div class="text-center mb-3">
                    <span class="text-muted">veya</span>
                </div>
                
                <form method="post">
                    {% csrf_token %}
                    <input type="hidden" name="next" value="{{ next }}">
                    
                    {{ form|crispy }}
                    
                    {# Şifremi unuttum linki #}
                    <div class="text-end mb-3">
                        <a href="{% url 'password_reset' %}" class="text-muted small">Şifrenizi mi unuttunuz?</a>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">Giriş Yap</button>
                    </div>
                </form>
                <hr class="border-secondary my-4">
                <div class="text-center text-muted">
                    Hesabınız yok mu? <a href="{% url 'signup' %}" class="text-primary">Hemen Kayıt Olun</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function submitGoogleForm() {
    document.getElementById('googleForm').submit();
}
</script>
{% endblock %}
