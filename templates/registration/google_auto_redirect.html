<!DOCTYPE html>
<html>
<head>
    <title>Google'a Yönlendiriliyor...</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f5f5f5;
        }
        .loading {
            text-align: center;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4285f4;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loading">
        <div class="spinner"></div>
        <p>Google'a yönlendiriliyor...</p>
        <form id="googleForm" method="post" action="/accounts/google/login/">
            {% csrf_token %}
            <button type="submit" id="googleBtn" style="display: none;">İlerle</button>
        </form>
    </div>

    <script>
        // Sayfa yüklendiğinde otomatik olarak formu submit et
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(function() {
                document.getElementById('googleBtn').click();
            }, 500); // 0.5 saniye bekle
        });
    </script>
</body>
</html>
